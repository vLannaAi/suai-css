<!DOCTYPE html>
<html lang="en" data-su-theme="pla" data-su-mode="light">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUAI HTML - Semantic HTML Styling</title>
  <link rel="stylesheet" href="../suai.bundle.css">
  <script src="../suai-theme.js" defer></script>
</head>
<body>
  <div class="su-switcher" aria-label="Theme controls">
    <div class="su-switcher-group su-switcher-skin" role="group" aria-label="Skin">
      <span class="su-switcher-label">Skin</span>
      <button type="button" data-su-set-theme="pla">PLA</button>
      <button type="button" data-su-set-theme="nok">NOK</button>
      <button type="button" data-su-set-theme="maa">MAA</button>
      <button type="button" data-su-set-theme="kob">KOB</button>
    </div>
    <div class="su-switcher-group su-switcher-mode" role="group" aria-label="Mode">
      <span class="su-switcher-label">Mode</span>
      <button type="button" data-su-set-mode="light">Light</button>
      <button type="button" data-su-set-mode="dark">Dark</button>
    </div>
  </div>
  <h1>SUAI HTML Demo</h1>
  <nav>
    <ul>
      <li><a href="1.text.html">1. Text Elements</a></li>
      <li><a href="2.display.html">2. Display Elements</a></li>
      <li><a href="3.form.html">3. Form Controls</a></li>
      <li><a href="4.media.html">4. Media Elements</a></li>
      <li><a href="5.layout.html">5. Layout Elements</a></li>
      <li><a href="6.theme.html">6. Theme Reference</a></li>
    </ul>
  </nav>
</body>
</html>
